name: secure_messenger
description: End-to-end encrypted secure messaging mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ── Cryptography ───────────────────────────────────────────────────────────
  # Pure-Dart cryptographic primitives: X25519 ECDH, Ed25519 signing,
  # AES-256-GCM encryption, HKDF key derivation
  cryptography: ^2.5.0


  # ── Secure Key Storage ─────────────────────────────────────────────────────
  # Android : EncryptedSharedPreferences backed by Android Keystore (AES-256)
  # iOS     : Keychain Services (hardware-backed on Secure Enclave devices)
  flutter_secure_storage: ^10.0.0

  # ── Networking ─────────────────────────────────────────────────────────────
  dio: ^5.4.0                    # HTTP client with interceptors
  web_socket_channel: ^3.0.3    # WebSocket for real-time push

  # ── State Management ───────────────────────────────────────────────────────
  provider: ^6.1.1

  # ── Utilities ──────────────────────────────────────────────────────────────
  uuid: ^4.3.3      # UUID4 nonce generation for anti-replay headers

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
